from sqlalchemy.dialects.postgresql import UUID
from sqlalchemy.orm import relationship
from database import Base
import uuid
from datetime import datetime

class Session(Base):
    __tablename__ = "sessions"
    id               = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
    ip_address       = Column(String(45))
    device           = Column(String(20))        # mobile | tablet | desktop
    user_agent       = Column(Text)
    referrer         = Column(Text)
    country          = Column(String(100))
    city             = Column(String(100))
    region           = Column(String(100))
    start_time       = Column(DateTime, default=datetime.utcnow)
    end_time         = Column(DateTime, nullable=True)
    duration_seconds = Column(Float, nullable=True)
    pages_viewed     = Column(Integer, default=0)
    used_designer    = Column(SmallInteger, default=0)
    consent_given    = Column(SmallInteger, default=0)
    pageviews        = relationship("PageView", back_populates="session")
    lead             = relationship("Lead", back_populates="session", uselist=False)

class PageView(Base):
    __tablename__ = "pageviews"
    id           = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
    session_id   = Column(UUID(as_uuid=True), ForeignKey("sessions.id"))
    page_url     = Column(Text)
    page_title   = Column(String(255))
    timestamp    = Column(DateTime, default=datetime.utcnow)
    time_on_page = Column(Float, nullable=True)
    session      = relationship("Session", back_populates="pageviews")

class Lead(Base):
    __tablename__ = "leads"
    id          = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
    session_id  = Column(UUID(as_uuid=True), ForeignKey("sessions.id"))
    first_name  = Column(String(100))
    last_name   = Column(String(100))
    email       = Column(String(255), unique=True, index=True)
    company     = Column(String(255), nullable=True)
    score       = Column(Integer, default=0)
    score_label = Column(String(10))            # HOT | WARM | COLD
    created_at  = Column(DateTime, default=datetime.utcnow)
    session     = relationship("Session", back_populates="lead")`} />

      <CodeBlock filename="routers/tracking.py" code={`from fastapi import APIRouter, Depends, Request
from sqlalchemy.orm import Session as DBSession
from slowapi import Limiter
from slowapi.util import get_remote_address
from database import get_db
from models import Session, PageView
from schemas import SessionStartRequest, PageViewRequest, SessionEndRequest
from services.geolocation import get_location
import user_agents

router  = APIRouter()
limiter = Limiter(key_func=get_remote_address)

@router.post("/session/start")
@limiter.limit("30/minute")
async def start_session(req: Request, body: SessionStartRequest,
                        db: DBSession = Depends(get_db)):
    ip  = req.headers.get("X-Forwarded-For", req.client.host).split(",")[0].strip()
    ua  = user_agents.parse(body.user_agent or "")
    dev = "mobile" if ua.is_mobile else ("tablet" if ua.is_tablet else "desktop")
    loc = await get_location(ip)

    session = Session(
        id            = body.session_id,
        ip_address    = ip,
        device        = dev,
        user_agent    = body.user_agent,
        referrer      = body.referrer,
        country       = loc.get("country"),
        city          = loc.get("city"),
        region        = loc.get("region"),
        consent_given = int(body.consent_given),
    )
    db.add(session); db.commit()
    return {"status": "ok", "session_id": str(session.id)}

@router.post("/pageview")
@limiter.limit("60/minute")
async def track_pageview(req: Request, body: PageViewRequest,
                         db: DBSession = Depends(get_db)):
    pv = PageView(
        session_id   = body.session_id,
        page_url     = body.page_url[:500],
        page_title   = (body.page_title or "")[:255],
        time_on_page = body.time_on_page,
    )
    db.add(pv)
    s = db.query(Session).filter(Session.id == body.session_id).first()
    if s:
        s.pages_viewed = (s.pages_viewed or 0) + 1
        if "designer" in body.page_url.lower() or body.used_designer:
            s.used_designer = 1
    db.commit()
    return {"status": "ok"}

@router.post("/session/end")
@limiter.limit("30/minute")
async def end_session(req: Request, body: SessionEndRequest,
                      db: DBSession = Depends(get_db)):
    from datetime import datetime
    s = db.query(Session).filter(Session.id == body.session_id).first()
    if s:
        s.end_time         = datetime.utcnow()
        s.duration_seconds = body.duration_seconds
        db.commit()
    return {"status": "ok"}`} />

      <CodeBlock filename="routers/leads.py" code={`from fastapi import APIRouter, Depends, Request, HTTPException
from sqlalchemy.orm import Session as DBSession
from slowapi import Limiter
from slowapi.util import get_remote_address
from database import get_db
from models import Lead, Session
from schemas import LeadSubmitRequest
from services.scoring import calculate_score
import bleach, re

router  = APIRouter()
limiter = Limiter(key_func=get_remote_address)

def sanitize(val):     return bleach.clean(val.strip()) if val else None
def valid_email(e):    return bool(re.match(r'^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$', e))

@router.post("/submit")
@limiter.limit("5/minute")
async def submit_lead(req: Request, body: LeadSubmitRequest,
                      db: DBSession = Depends(get_db)):
    if not valid_email(body.email):
        raise HTTPException(400, "Invalid email address")

    existing = db.query(Lead).filter(Lead.email == body.email.lower()).first()
    if existing:
        return {"status": "exists", "lead_id": str(existing.id)}

    session        = db.query(Session).filter(Session.id == body.session_id).first()
    score, label   = calculate_score(session)

    lead = Lead(
        session_id  = body.session_id,
        first_name  = sanitize(body.first_name),
        last_name   = sanitize(body.last_name),
        email       = sanitize(body.email.lower()),
        company     = sanitize(body.company),
        score       = score,
        score_label = label,
    )
    db.add(lead); db.commit()
    return {"status": "ok", "lead_id": str(lead.id), "score": score, "label": label}`} />
    </Card>

    <Card>
      <SectionTitle sub="Point-based scoring engine">services/scoring.py</SectionTitle>
      <CodeBlock filename="services/scoring.py" code={`def calculate_score(session) -> tuple[int, str]:
    if not session:
        return 10, "COLD"

    score    = 0
    duration = session.duration_seconds or 0
    pages    = session.pages_viewed     or 0
    designer = bool(session.used_designer)

    # Time on site
    if   duration >= 180: score += 35   # 3+ min
    elif duration >=  60: score += 20   # 1-3 min
    elif duration >=  30: score += 10   # 30-60 sec

    # Pages viewed
    if   pages >= 5: score += 25
    elif pages >= 3: score += 15
    elif pages >= 2: score +=  8

    # Used solar designer tool
    if designer: score += 30

    # Form submitted (called only on submission)
    score += 10

    label = "HOT" if score >= 70 else ("WARM" if score >= 40 else "COLD")
    return min(score, 100), label`} />

CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

-- Sessions
CREATE TABLE sessions (
  id               UUID         PRIMARY KEY DEFAULT uuid_generate_v4(),
  ip_address       VARCHAR(45),
  device           VARCHAR(20)  CHECK (device IN ('mobile','tablet','desktop')),
  user_agent       TEXT,
  referrer         TEXT,
  country          VARCHAR(100),
  city             VARCHAR(100),
  region           VARCHAR(100),
  start_time       TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
  end_time         TIMESTAMPTZ,
  duration_seconds FLOAT,
  pages_viewed     INTEGER      DEFAULT 0,
  used_designer    SMALLINT     DEFAULT 0,
  consent_given    SMALLINT     DEFAULT 0,
  created_at       TIMESTAMPTZ  DEFAULT NOW()
);

-- Page Views
CREATE TABLE pageviews (
  id           UUID        PRIMARY KEY DEFAULT uuid_generate_v4(),
  session_id   UUID        REFERENCES sessions(id) ON DELETE CASCADE,
  page_url     TEXT        NOT NULL,
  page_title   VARCHAR(255),
  timestamp    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
  time_on_page FLOAT
);

-- Leads
CREATE TABLE leads (
  id          UUID        PRIMARY KEY DEFAULT uuid_generate_v4(),
  session_id  UUID        REFERENCES sessions(id) ON DELETE SET NULL,
  first_name  VARCHAR(100),
  last_name   VARCHAR(100),
  email       VARCHAR(255) NOT NULL UNIQUE,
  company     VARCHAR(255),
  score       INTEGER      DEFAULT 0 CHECK (score BETWEEN 0 AND 100),
  score_label VARCHAR(10)  CHECK (score_label IN ('HOT','WARM','COLD')),
  created_at  TIMESTAMPTZ  DEFAULT NOW()
);

-- Indexes
CREATE INDEX idx_sessions_start    ON sessions  (start_time DESC);
CREATE INDEX idx_pageviews_session ON pageviews (session_id);
CREATE INDEX idx_pageviews_url     ON pageviews (page_url);
CREATE INDEX idx_leads_email       ON leads     (email);
CREATE INDEX idx_leads_score       ON leads     (score DESC);
CREATE INDEX idx_leads_created     ON leads     (created_at DESC);`} />

   Usage: <script src="/js/tracker.js"
                  data-api="https://your-api.render.com"><\/script>
*/
(function () {
  const API = document.currentScript?.getAttribute("data-api")
            || "https://your-api.render.com";
  const HEARTBEAT_MS = 8000;

  // UUID helper
  const uuid = () => crypto.randomUUID
    ? crypto.randomUUID()
    : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
      });

  // Fire-and-forget POST
  const post = (path, data) => {
    if (!window.__solarConsent) return;
    return fetch(API + path, {
      method:    "POST",
      headers:   { "Content-Type": "application/json" },
      body:      JSON.stringify(data),
      keepalive: true,
    }).catch(() => {});
  };

  // Session ID (tab-scoped)
  const KEY = "solar_sid";
  let sid = sessionStorage.getItem(KEY);
  if (!sid) { sid = uuid(); sessionStorage.setItem(KEY, sid); }
  window.__solarSessionId = sid;

  // Designer-use flag
  const markDesigner = () => {
    sessionStorage.setItem("solar_designer", "1");
    window.__solarDesignerUsed = true;
  };
  document.addEventListener("click", e => {
    if (e.target?.closest?.("[data-solar-designer]")) markDesigner();
  });

  // Core tracking calls
  const pageStart = Date.now();

  const startSession = () => post("/track/session/start", {
    session_id:    sid,
    user_agent:    navigator.userAgent,
    referrer:      document.referrer || null,
    consent_given: true,
  });

  const trackPageView = (timeOnPrev) => post("/track/pageview", {
    session_id:    sid,
    page_url:      location.href,
    page_title:    document.title,
    time_on_page:  timeOnPrev || null,
    used_designer: !!sessionStorage.getItem("solar_designer"),
  });

  const endSession = () => post("/track/session/end", {
    session_id:      sid,
    duration_seconds: (Date.now() - pageStart) / 1000,
  });

  // Heartbeat
  let timer;
  const startHeartbeat = () => {
    timer = setInterval(() => post("/track/session/end", {
      session_id:      sid,
      duration_seconds: (Date.now() - pageStart) / 1000,
    }), HEARTBEAT_MS);
  };

  // Lead form triggers
  let triggered = false;
  const showForm = () => {
    if (triggered) return;
    triggered = true;
    window.dispatchEvent(new CustomEvent("solar:showLeadForm"));
  };
  setTimeout(showForm, 15000);  // after 15 s
  document.addEventListener("click", e => {
    if (e.target?.closest?.("[data-solar-cta]")) showForm();
  });

  // Boot
  window.__solarConsent = !!localStorage.getItem("solar_consent");

  const boot = () => { startSession(); trackPageView(); startHeartbeat(); };
  if (window.__solarConsent) { boot(); }
  else { window.addEventListener("solar:consentGiven", boot, { once: true }); }

  window.addEventListener("beforeunload", () => { clearInterval(timer); endSession(); });
  window.solarTracker = { showForm, markDesigner };
})();`} />

                    {new Date(l.created_at).toLocaleDateString()}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

      </div>
    </div>
  );
}`} />
